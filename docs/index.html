<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PF HR Module</title>
  <style>
    /* ================================================================
       PIER FOUNDATIONS DESIGN TOKENS (from Tether, verbatim)
       ================================================================ */
    :root {
      --pf-blue:    #2a93c1;
      --pf-orange:  #f1420b;
      --pf-green:   #10b981;
      --pf-gold:    #D4A574;
      --pf-red:     #ef4444;
      /* Dark set retained for reference only - not used in light portal */
      /* --pf-bg: #0b0f14; --pf-surface: #131820; --pf-card: #171e28; */
      /* --pf-border: #1e2a38; --pf-text: #e8ecf0; --pf-muted: #7a8a9e; */
      --pf-bg-light:     #ffffff;
      --pf-card-light:   #f7f9fb;
      --pf-border-light: #e3e8ee;
      --pf-text-light:   #0b0f14;
      --pf-muted-light:  #5a6b7e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: var(--pf-bg-light);
      color: var(--pf-text-light);
      line-height: 1.7;
      font-size: .85rem;
      padding: 1.2rem;
      min-height: 100vh;
    }

    /* Section labels */
    .section-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--pf-orange);
      margin-bottom: .6rem;
    }
    .section-label.blue { color: var(--pf-blue); }

    /* Titles */
    .page-title {
      font-size: clamp(1.2rem, 2.8vw, 1.6rem);
      font-weight: 700;
      color: var(--pf-text-light);
      margin-bottom: .4rem;
    }
    .page-subtitle {
      font-size: .82rem;
      color: var(--pf-muted-light);
      margin-bottom: 1.4rem;
    }

    /* Cards -- 3px left accent bar */
    .pf-card {
      background: var(--pf-card-light);
      border: 1px solid var(--pf-border-light);
      border-radius: 10px;
      padding: 1.3rem 1.6rem;
      position: relative;
      margin-bottom: .8rem;
    }
    .pf-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
      background: var(--pf-blue);
    }
    .pf-card.accent-orange::before { background: var(--pf-orange); }
    .pf-card.accent-green::before { background: var(--pf-green); }
    .pf-card.accent-gold::before { background: var(--pf-gold); }
    .pf-card.accent-red::before { background: var(--pf-red); }

    .card-title {
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 700;
      color: var(--pf-text-light);
      margin-bottom: .6rem;
    }

    /* Chips */
    .pf-chip {
      display: inline-block;
      border-radius: 3px;
      font-size: .6rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      padding: 3px 8px;
    }
    .pf-chip.blue { background: rgba(42,147,193,.1); color: var(--pf-blue); }
    .pf-chip.orange { background: rgba(241,66,11,.1); color: var(--pf-orange); }
    .pf-chip.green { background: rgba(16,185,129,.1); color: var(--pf-green); }
    .pf-chip.red { background: rgba(239,68,68,.1); color: var(--pf-red); }
    .pf-chip.gold { background: rgba(212,165,116,.1); color: var(--pf-gold); }
    .pf-chip.muted { background: rgba(122,138,158,.1); color: var(--pf-muted-light); }

    /* Status pills -- 18px square, 4px radius */
    .status-pill {
      display: inline-block;
      width: 18px; height: 18px;
      border-radius: 4px;
      border: 1.5px solid;
      vertical-align: middle;
    }
    .status-pill.pending { border-color: var(--pf-muted-light); background: transparent; }
    .status-pill.in-progress { border-color: var(--pf-orange); background: rgba(241,66,11,.2); }
    .status-pill.done { border-color: var(--pf-green); background: rgba(16,185,129,.2); }

    /* Grids */
    .pf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: .8rem;
      margin-bottom: 1.2rem;
    }
    .pf-grid-sm {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: .8rem;
      margin-bottom: 1.2rem;
    }

    /* Tab nav */
    .tab-nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--pf-border-light);
      margin-bottom: 1.4rem;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--pf-muted-light);
      font-size: .8rem;
      font-weight: 600;
      padding: .7rem 1.2rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
    }
    .tab-btn:hover { color: var(--pf-text-light); }
    .tab-btn.active {
      color: var(--pf-blue);
      border-bottom-color: var(--pf-blue);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Tables */
    .pf-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }
    .pf-table th {
      text-align: left;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--pf-muted-light);
      padding: .7rem .8rem;
      border-bottom: 1px solid var(--pf-border-light);
    }
    .pf-table td {
      padding: .7rem .8rem;
      border-bottom: 1px solid var(--pf-border-light);
      color: var(--pf-text-light);
    }
    .pf-table tr:last-child td { border-bottom: none; }
    .pf-table tr:hover td { background: rgba(42,147,193,.04); }

    /* Buttons */
    .pf-btn {
      border: none;
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 600;
      padding: .5rem 1.2rem;
      cursor: pointer;
      transition: opacity .2s;
    }
    .pf-btn:hover { opacity: .85; }
    .pf-btn.primary { background: var(--pf-orange); color: #fff; }
    .pf-btn.secondary { background: var(--pf-blue); color: #fff; }
    .pf-btn.outline { background: none; border: 1px solid var(--pf-border-light); color: var(--pf-text-light); }
    .pf-btn.sm { font-size: .7rem; padding: .3rem .8rem; }

    /* Form fields */
    .pf-input, .pf-select {
      width: 100%;
      padding: .5rem .8rem;
      background: var(--pf-bg-light);
      border: 1px solid var(--pf-border-light);
      border-radius: 6px;
      color: var(--pf-text-light);
      font-size: .82rem;
      font-family: inherit;
      line-height: 1.7;
    }
    .pf-input:focus, .pf-select:focus { outline: none; border-color: var(--pf-blue); }
    .field-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--pf-muted-light);
      margin-bottom: .3rem;
      display: block;
    }
    .field-group { margin-bottom: .8rem; }

    /* Metric stat */
    .stat-box {
      background: var(--pf-bg-light);
      border-radius: 8px;
      padding: .8rem;
      text-align: center;
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--pf-blue);
    }
    .stat-label {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--pf-muted-light);
      margin-top: .2rem;
    }

    /* Progress bar */
    .pf-progress {
      height: 6px;
      background: var(--pf-border-light);
      border-radius: 3px;
      overflow: hidden;
      margin-top: .5rem;
    }
    .pf-progress-bar {
      height: 100%;
      border-radius: 3px;
      transition: width .4s ease;
    }

    /* Info row */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .6rem 0;
      border-bottom: 1px solid var(--pf-border-light);
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--pf-muted-light); font-size: .82rem; }
    .info-val { color: var(--pf-text-light); font-size: .82rem; font-weight: 500; }

    /* Toast */
    .pf-toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--pf-card-light);
      border: 1px solid var(--pf-green);
      border-radius: 8px;
      padding: .8rem 1.2rem;
      color: var(--pf-green);
      font-size: .82rem;
      font-weight: 600;
      z-index: 9999;
      animation: toastIn .3s ease;
    }
    @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* Modal overlay */
    .pf-modal-overlay {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,.7);
      z-index: 5000;
      display: flex; align-items: center; justify-content: center;
    }
    .pf-modal {
      background: var(--pf-card-light);
      border: 1px solid var(--pf-border-light);
      border-radius: 10px;
      padding: 1.6rem;
      max-width: 500px;
      width: 90%;
    }
  </style>
</head>

     Same-origin module: deploys as a path under pf-platform (e.g. /hr/).

     ================================================================ */

  /* -- Auth: reads pf_auth_token cookie (set by the PF shell) -- */
  function getPFAuthToken() {
    var match = document.cookie.match(/(?:^|;\s*)pf_auth_token=([^;]*)/);
    return match ? decodeURIComponent(match[1]) : null;
  }

  function esc(str) {
    if (!str) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  /** Escape for use inside HTML attribute values (handles quotes) */
  function escAttr(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function toast(msg) {
    var t = document.createElement('div');
    t.className = 'pf-toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { if (t.parentNode) t.remove(); }, 3000);
  }

  function switchTab(tab) {
    STATE.currentTab = tab;
    render();
  }

  function render() {
    var tabs = [
      { id: 'records', label: 'Employee Records' },
      { id: 'onboarding', label: 'Onboarding' },
      { id: 'policies', label: 'Policies' },
      { id: 'timeoff', label: 'Time Off' },
      { id: 'performance', label: 'Performance' },
      { id: 'orgchart', label: 'Org Chart' },
      { id: 'compliance', label: 'Compliance' },

      return '<button class="tab-btn' + (STATE.currentTab === t.id ? ' active' : '') + '" onclick="switchTab(\'' + t.id + '\')">' + t.label + '</button>';
    }).join('') + '</div>';

    var content = '';
    switch(STATE.currentTab) {
      case 'records': content = renderRecords(); break;
      case 'onboarding': content = renderOnboarding(); break;
      case 'policies': content = renderPolicies(); break;
      case 'timeoff': content = renderTimeOff(); break;

      case 'orgchart': content = renderOrgChart(); break;

          '</ul></div>' +
        '<div style="background:var(--pf-bg-light);padding:1rem;border:1px solid var(--pf-border-light);border-radius:8px;">' +
          '<div class="section-label blue">SECTION 3: DEVELOPMENT</div>' +
          '<ul style="color:var(--pf-muted-light);font-size:.82rem;padding-left:1rem;line-height:2;">' +
            '<li>Strengths to leverage</li><li>Growth areas (max 2)</li><li>Training / certifications needed</li><li>Q3-Q4 goals (SMART)</li>' +
          '</ul></div>' +
        '<div style="background:var(--pf-bg-light);padding:1rem;border:1px solid var(--pf-border-light);border-radius:8px;">' +
          '<div class="section-label">SECTION 4: SELF-ASSESSMENT</div>' +
          '<ul style="color:var(--pf-muted-light);font-size:.82rem;padding-left:1rem;line-height:2;">' +
            '<li>Proudest achievement this half</li><li>Biggest challenge faced</li><li>What support do you need?</li><li>Career aspirations (1yr / 3yr)</li>' +
          '</ul></div>' +
      '</div>' +
    '</div>';

    return cycleCard +
      '<div class="pf-card">' +
        '<div class="card-title">Team Reviews</div>' +
        '<div style="overflow-x:auto;">' +
          '<table class="pf-table"><thead><tr><th>Employee</th><th>Self</th><th>Manager</th><th>Rating</th><th>Goals</th><th>Status</th><th>Action</th></tr></thead><tbody>' + rows + '</tbody></table>' +
        '</div>' +
      '</div>' +
      templateCard;
  }

  /* ================================================================
     TAB: ORG CHART & JOB DESCRIPTIONS
     ================================================================ */

  function renderOrgChart() {
    var deptCards = STATE.orgChart.departments.map(function(dept) {
      var empList = STATE.employees.filter(function(e) { return e.department === dept.name; });
      var empRows = empList.map(function(e) {
        var statusChip = e.status === 'active' ? '<span class="pf-chip green">ACTIVE</span>' : '<span class="pf-chip orange">ONBOARDING</span>';
        return '<tr>' +
          '<td><strong>' + esc(e.name) + '</strong></td>' +
          '<td>' + esc(e.title) + '</td>' +
          '<td>' + esc(e.location) + '</td>' +
          '<td>' + statusChip + '</td>' +
        '</tr>';
      }).join('');

      var accentClass = { 'Executive': 'accent-gold', 'Operations': 'accent-blue', 'Field Ops': 'accent-orange', 'Admin': 'accent-green', 'Finance': '' }[dept.name] || '';

      return '<div class="pf-card ' + accentClass + '">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;">' +
          '<div class="card-title">' + dept.name + '</div>' +
          '<span class="pf-chip blue">' + dept.count + ' EMPLOYEE' + (dept.count > 1 ? 'S' : '') + '</span>' +
        '</div>' +
        '<div style="font-size:.82rem;color:var(--pf-muted-light);margin-bottom:.8rem;">Department Head: <strong style="color:var(--pf-text-light);">' + esc(dept.head) + '</strong></div>' +
        '<div style="overflow-x:auto;">' +
          '<table class="pf-table"><thead><tr><th>Name</th><th>Title</th><th>Location</th><th>Status</th></tr></thead><tbody>' + empRows + '</tbody></table>' +
        '</div>' +
      '</div>';
    }).join('');

    /* Headcount summary */
    var byDept = STATE.orgChart.departments.map(function(d) {
      return '<div class="stat-box"><div class="stat-value" style="color:var(--pf-blue);">' + d.count + '</div><div class="stat-label">' + d.name + '</div></div>';
    }).join('');

    var locations = {};
    STATE.employees.forEach(function(e) {
      var city = e.location.split(',')[0].trim();
      locations[city] = (locations[city] || 0) + 1;
    });
    var locCards = Object.keys(locations).map(function(loc) {
      return '<div class="stat-box"><div class="stat-value" style="color:var(--pf-green);">' + locations[loc] + '</div><div class="stat-label">' + loc + '</div></div>';
    }).join('');

    return '' +
      '<div class="pf-card accent-blue" style="margin-bottom:.8rem;">' +
        '<div class="card-title">Headcount by Department</div>' +
        '<div class="pf-grid-sm">' + byDept + '</div>' +
      '</div>' +
      '<div class="pf-card accent-green" style="margin-bottom:.8rem;">' +
        '<div class="card-title">Headcount by Location</div>' +
        '<div class="pf-grid-sm">' + locCards + '</div>' +
      '</div>' +
      deptCards;
  }

  /* ================================================================
     TAB: COMPLIANCE DASHBOARD
     ================================================================ */

  function renderCompliance() {
    var done = STATE.compliance.filter(function(c){return c.status==='done'}).length;
    var inProg = STATE.compliance.filter(function(c){return c.status==='in-progress'}).length;
    var pending = STATE.compliance.filter(function(c){return c.status==='pending'}).length;
    var total = STATE.compliance.length;
    var overallPct = Math.round((done/total)*100);

    var statusChip = function(s) {
      if (s === 'done') return '<span class="pf-chip green">COMPLETE</span>';
      if (s === 'in-progress') return '<span class="pf-chip orange">IN PROGRESS</span>';
      return '<span class="pf-chip red">NOT STARTED</span>';
    };

    var rows = STATE.compliance.map(function(c) {
      var pct = c.total > 0 ? Math.round((c.completed/c.total)*100) : 0;
      var barColor = c.status === 'done' ? 'var(--pf-green)' : c.status === 'in-progress' ? 'var(--pf-orange)' : 'var(--pf-red)';
      return '<tr>' +
        '<td><strong>' + esc(c.item) + '</strong></td>' +
        '<td><span class="pf-chip muted">' + c.category + '</span></td>' +
        '<td>' + c.dueDate + '</td>' +
        '<td>' + c.completed + '/' + c.total +
          '<div class="pf-progress" style="margin-top:4px;"><div class="pf-progress-bar" style="width:' + pct + '%;background:' + barColor + ';"></div></div>' +
        '</td>' +
        '<td>' + statusChip(c.status) + '</td>' +
      '</tr>';
    }).join('');

    /* Expiring soon (due within 30 days) */
    var today = new Date();
    var thirtyDays = new Date(today.getTime() + 30*24*60*60*1000);
    var expiring = STATE.compliance.filter(function(c) {
      return c.status !== 'done' && new Date(c.dueDate) <= thirtyDays;
    });

    var alertHtml = '';
    if (expiring.length > 0) {
      alertHtml = '<div class="pf-card accent-red" style="margin-bottom:.8rem;">' +
        '<div class="card-title" style="color:var(--pf-red);">Expiring Within 30 Days</div>' +
        expiring.map(function(c) {
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--pf-border-light);">' +
            '<div><strong>' + esc(c.item) + '</strong> <span class="pf-chip muted">' + c.category + '</span></div>' +
            '<div style="font-size:.82rem;color:var(--pf-red);font-weight:600;">Due: ' + c.dueDate + ' (' + c.completed + '/' + c.total + ' done)</div>' +
          '</div>';
        }).join('') +
      '</div>';
    }

    return '' +
      '<div class="pf-card accent-blue" style="margin-bottom:.8rem;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;">' +
          '<div class="card-title">Compliance Overview</div>' +
          '<span style="font-weight:700;color:var(--pf-blue);">' + overallPct + '% Complete</span>' +
        '</div>' +
        '<div class="pf-grid-sm" style="margin-bottom:.8rem;">' +
          '<div class="stat-box"><div class="stat-value" style="color:var(--pf-blue);">' + total + '</div><div class="stat-label">Total Items</div></div>' +
          '<div class="stat-box"><div class="stat-value" style="color:var(--pf-green);">' + done + '</div><div class="stat-label">Complete</div></div>' +
          '<div class="stat-box"><div class="stat-value" style="color:var(--pf-orange);">' + inProg + '</div><div class="stat-label">In Progress</div></div>' +
          '<div class="stat-box"><div class="stat-value" style="color:var(--pf-red);">' + pending + '</div><div class="stat-label">Not Started</div></div>' +
        '</div>' +
        '<div class="pf-progress" style="height:8px;"><div class="pf-progress-bar" style="width:' + overallPct + '%;background:var(--pf-green);"></div></div>' +
      '</div>' +
      alertHtml +
      '<div class="pf-card">' +
        '<div class="card-title">All Compliance Items</div>' +
        '<div style="overflow-x:auto;">' +
          '<table class="pf-table"><thead><tr><th>Item</th><th>Category</th><th>Due Date</th><th>Progress</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>' +
        '</div>' +
      '</div>';
  }

  /* ================================================================
     TAB: TRAINING STUDIO
     ================================================================ */

  function renderTrainingStudio() {
    var ss = STATE.studioState;

    /* Upload section */
    var uploadHtml = '<div class="pf-card accent-blue" style="margin-bottom:.8rem;">' +
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:.8rem;">' +
        '<span style="font-size:1.3rem;">&#x1F4E4;</span>' +
        '<div>' +
          '<div style="font-weight:700;color:var(--pf-text-light);">Upload an SOP</div>' +
          '<div style="font-size:.75rem;color:var(--pf-muted-light);">Upload a .txt or .md file to auto-generate training</div>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:.8rem;align-items:center;">' +
        '<input type="file" id="pf-sop-upload" accept=".txt,.md" style="display:none;" onchange="handlePFUpload(this)">' +
        '<button class="pf-btn primary" onclick="document.getElementById(\'pf-sop-upload\').click()">Choose File</button>' +
        '<span id="pf-upload-status" style="font-size:.8rem;color:var(--pf-muted-light);"></span>' +
      '</div>' +
    '</div>';

    /* SOP cards */
    var sopCards = STATE.trainingSops.map(function(sop) {
      var isSelected = ss.selectedSop === sop.id;
      return '<div class="pf-card' + (isSelected ? ' accent-orange' : '') + '" onclick="selectPFSop(\'' + sop.id + '\')" style="cursor:pointer;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<div>' +
            '<div style="font-weight:600;color:var(--pf-text-light);">' + esc(sop.name) + '</div>' +
            '<div style="display:flex;gap:6px;margin-top:4px;">' +
              '<span class="pf-chip blue">' + sop.category + '</span>' +
              '<span class="pf-chip muted">' + sop.sections.length + ' sections</span>' +
            '</div>' +
          '</div>' +
          (isSelected ? '<span class="pf-chip orange">SELECTED</span>' : '') +
        '</div>' +
      '</div>';
    }).join('');

    /* Output content */
    var outputContent = '';
    if (ss.selectedSop) {
      var sop = STATE.trainingSops.find(function(s) { return s.id === ss.selectedSop; });
      if (sop) {
        var outputBtns = [
          { id: 'presentation', icon: '&#x1F4FD;', label: 'Presentation' },
          { id: 'quiz', icon: '&#x1F4DD;', label: 'Quiz' },
          { id: 'audio', icon: '&#x1F3A7;', label: 'Audio Script' },
          { id: 'flashcards', icon: '&#x1F0CF;', label: 'Flashcards' }
        ];

        var btnsHtml = outputBtns.map(function(btn) {
          var isActive = ss.activeOutput === btn.id;
          return '<button onclick="setPFOutput(\'' + btn.id + '\')" class="pf-btn ' + (isActive ? 'primary' : 'outline') + '" style="flex:1;text-align:center;padding:.8rem;">' +
            '<div style="font-size:1.2rem;">' + btn.icon + '</div>' +
            '<div style="font-size:.75rem;margin-top:2px;">' + btn.label + '</div>' +
          '</button>';
        }).join('');

        var formatBtns = '<div style="display:flex;gap:.5rem;margin-bottom:1rem;">' + btnsHtml + '</div>';

        if (ss.activeOutput === 'presentation') outputContent = formatBtns + renderPFPresentation(sop);
        else if (ss.activeOutput === 'quiz') outputContent = formatBtns + renderPFQuiz(sop);
        else if (ss.activeOutput === 'audio') outputContent = formatBtns + renderPFAudio(sop);
        else if (ss.activeOutput === 'flashcards') outputContent = formatBtns + renderPFFlashcards(sop);
        else outputContent = formatBtns + '<div class="pf-card"><div style="text-align:center;padding:2rem;color:var(--pf-muted-light);">Select an output format above</div></div>';
      }
    }

    /* Completion log */
    var completionRows = STATE.trainingCompletions.map(function(c) {
      return '<tr>' +
        '<td>' + esc(c.employee) + '</td>' +
        '<td>' + esc(c.sop) + '</td>' +
        '<td>' + c.date + '</td>' +
        '<td><span style="font-weight:700;color:' + (c.score >= 70 ? 'var(--pf-green)' : 'var(--pf-red)') + ';">' + c.score + '%</span></td>' +
        '<td>' + (c.passed ? '<span class="pf-chip green">PASS</span>' : '<span class="pf-chip red">FAIL</span>') + '</td>' +
      '</tr>';
    }).join('');

    var completionLog = '<div class="pf-card" style="margin-top:1.2rem;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;">' +
        '<div class="card-title">Training Completion Audit Log</div>' +
        '<span class="pf-chip green">' + STATE.trainingCompletions.filter(function(c){return c.passed}).length + ' PASSED</span>' +
      '</div>' +
      '<div style="overflow-x:auto;">' +
        '<table class="pf-table"><thead><tr><th>Employee</th><th>SOP</th><th>Date</th><th>Score</th><th>Result</th></tr></thead><tbody>' + completionRows + '</tbody></table>' +
      '</div>' +
      '<div style="margin-top:.8rem;padding:.8rem;background:var(--pf-card-light);border:1px solid var(--pf-border-light);border-radius:6px;font-size:.75rem;color:var(--pf-muted-light);">' +
        'This log is the auditable proof of training completion. Each entry includes employee name, SOP covered, date, score, and pass/fail status. Retained for compliance documentation and available for OSHA inspection.' +
      '</div>' +
    '</div>';

    return uploadHtml +
      '<div class="section-label blue" style="margin-bottom:.6rem;">AVAILABLE SOPs</div>' +
      '<div class="pf-grid">' + sopCards + '</div>' +
      (outputContent ? '<div style="margin-top:1rem;">' + outputContent + '</div>' : '') +
      completionLog;
  }

  function selectPFSop(sopId) {
    STATE.studioState.selectedSop = sopId;
    STATE.studioState.activeOutput = null;
    STATE.studioState.quizAnswers = {};
    STATE.studioState.slideIndex = 0;
    render();
  }

  function setPFOutput(outputId) {
    STATE.studioState.activeOutput = outputId;
    STATE.studioState.quizAnswers = {};
    STATE.studioState.slideIndex = 0;
    STATE.studioState.flashcardIndex = 0;
    STATE.studioState.flashcardFlipped = false;
    render();
  }

  /* -- Presentation -- */
  function renderPFPresentation(sop) {
    var idx = STATE.studioState.slideIndex;
    var slide = sop.sections[idx];
    var total = sop.sections.length;
    var pct = Math.round(((idx + 1) / total) * 100);

    var prevBtn = idx > 0 ? '<button class="pf-btn outline" onclick="pfSlide(-1)">Previous</button>' : '<div></div>';
    var nextBtn = idx < total - 1 ? '<button class="pf-btn primary" onclick="pfSlide(1)">Next Slide</button>' : '<button class="pf-btn" style="background:var(--pf-green);color:#fff;" onclick="toast(\'Presentation complete. Logged to compliance record.\')">Complete</button>';

    return '<div class="pf-card accent-orange">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:.6rem;">' +
        '<span style="font-size:.7rem;color:var(--pf-muted-light);">SLIDE ' + (idx+1) + ' OF ' + total + '</span>' +
        '<span style="font-size:.7rem;color:var(--pf-orange);font-weight:600;">' + pct + '%</span>' +
      '</div>' +
      '<div class="pf-progress" style="margin-bottom:1.2rem;"><div class="pf-progress-bar" style="width:' + pct + '%;background:var(--pf-orange);"></div></div>' +
      '<div style="background:var(--pf-bg-light);border:1px solid var(--pf-border-light);border-radius:8px;padding:1.6rem;min-height:180px;margin-bottom:1rem;">' +
        '<div class="section-label">' + esc(sop.name) + '</div>' +
        '<div style="font-size:1.2rem;font-weight:700;color:var(--pf-text-light);margin-bottom:1rem;">' + esc(slide.title) + '</div>' +
        '<div style="font-size:.85rem;color:var(--pf-muted-light);line-height:1.8;white-space:pre-line;">' + esc(slide.content) + '</div>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;">' + prevBtn + nextBtn + '</div>' +
    '</div>';
  }

  function pfSlide(dir) {
    var sop = STATE.trainingSops.find(function(s){return s.id===STATE.studioState.selectedSop});
    STATE.studioState.slideIndex = Math.max(0, Math.min(sop.sections.length-1, STATE.studioState.slideIndex + dir));
    render();
  }

  /* -- Quiz -- */
  function renderPFQuiz(sop) {
    var questions = sop.sections.map(function(sec, i) {
      var q = 'Based on "' + sec.title + '": Which of the following is correct?';
      var correct = sec.content.substring(0, 80) + '...';
      var wrongs = [
        'This section does not apply to field employees',
        'This requirement is optional for small job sites',
        'Only supervisors are responsible for this procedure'
      ];
      var choices = [correct].concat(wrongs);
      var answered = STATE.studioState.quizAnswers[i] !== undefined;
      var isCorrect = answered && STATE.studioState.quizAnswers[i] === 0;

      var choicesHtml = choices.map(function(c, ci) {
        var bg = !answered ? 'var(--pf-card-light)' : (ci === 0 ? 'rgba(16,185,129,0.1)' : (STATE.studioState.quizAnswers[i] === ci ? 'rgba(239,68,68,0.1)' : 'var(--pf-card-light)'));
        var border = !answered ? 'var(--pf-border-light)' : (ci === 0 ? 'var(--pf-green)' : (STATE.studioState.quizAnswers[i] === ci && ci !== 0 ? 'var(--pf-red)' : 'var(--pf-border-light)'));
        return '<div onclick="' + (answered ? '' : 'pfAnswer(' + i + ',' + ci + ')') + '" style="background:' + bg + ';border:1px solid ' + border + ';border-radius:6px;padding:.6rem .8rem;margin-bottom:.4rem;cursor:' + (answered ? 'default' : 'pointer') + ';font-size:.82rem;color:var(--pf-text-light);">' + esc(c) + '</div>';
      }).join('');

      return '<div class="pf-card" style="' + (answered ? (isCorrect ? 'border-left:3px solid var(--pf-green);' : 'border-left:3px solid var(--pf-red);') : '') + '">' +
        '<div style="font-size:.65rem;color:var(--pf-muted-light);font-weight:700;letter-spacing:.15em;margin-bottom:.4rem;">QUESTION ' + (i+1) + '</div>' +
        '<div style="font-weight:600;color:var(--pf-text-light);margin-bottom:.8rem;">' + esc(q) + '</div>' +
        choicesHtml +
        (answered ? '<div style="margin-top:.5rem;font-size:.8rem;color:' + (isCorrect ? 'var(--pf-green)' : 'var(--pf-red)') + ';font-weight:600;">' + (isCorrect ? 'Correct' : 'Incorrect. Review the "' + esc(sec.title) + '" section.') + '</div>' : '') +
      '</div>';
    }).join('');

    var totalAnswered = Object.keys(STATE.studioState.quizAnswers).length;
    var totalCorrect = Object.keys(STATE.studioState.quizAnswers).filter(function(k){return STATE.studioState.quizAnswers[k]===0}).length;
    var allDone = totalAnswered === sop.sections.length;
    var passed = totalCorrect >= sop.sections.length * 0.7;

    var scoreCard = allDone ? '<div class="pf-card" style="border-left:3px solid ' + (passed ? 'var(--pf-green)' : 'var(--pf-red)') + ';margin-bottom:.8rem;">' +
      '<div style="text-align:center;padding:.8rem;">' +
        '<div style="font-size:2rem;font-weight:700;color:' + (passed ? 'var(--pf-green)' : 'var(--pf-red)') + ';">' + totalCorrect + '/' + sop.sections.length + '</div>' +
        '<div style="font-size:.85rem;color:var(--pf-muted-light);">' + (passed ? 'PASSED. Completion logged to audit record.' : 'Below 70% threshold. Review and retake.') + '</div>' +
      '</div></div>' : '';

    return scoreCard + questions;
  }

  function pfAnswer(qIdx, cIdx) {
    STATE.studioState.quizAnswers[qIdx] = cIdx;
    render();
  }

  /* -- Audio Script -- */
  function renderPFAudio(sop) {
    var totalMin = sop.sections.reduce(function(a, s){return a + Math.ceil(s.content.length/150)}, 0);

    var segments = sop.sections.map(function(sec, i) {
      var mins = Math.ceil(sec.content.length / 150);
      var intro = i === 0 ? 'Welcome to this safety training module on ' + sop.name + '. This module covers critical procedures that every Pier Foundations employee must understand before working on a job site.\n\n' : '';
      var transition = i > 0 ? '[Transition]\n\nNext, let us cover ' + sec.title.toLowerCase() + '.\n\n' : '';
      var closing = i === sop.sections.length - 1 ? '\n\n[Closing]\n\nThat concludes this training on ' + sop.name + '. If you have questions, speak with your Crew Lead or Brad Thompson directly. Your completion has been recorded in the compliance system. Stay safe on site.' : '';

      return '<div class="pf-card">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;">' +
          '<span style="font-size:.65rem;color:var(--pf-muted-light);font-weight:700;letter-spacing:.15em;">SEGMENT ' + (i+1) + ' | ~' + mins + ' MIN</span>' +
          '<button class="pf-btn secondary sm" onclick="toast(\'Playing: ' + escAttr(sec.title) + '\')">&#x25B6; Play</button>' +
        '</div>' +
        '<div style="font-weight:600;color:var(--pf-blue);margin-bottom:.5rem;">' + esc(sec.title) + '</div>' +
        '<div style="background:var(--pf-card-light);border:1px solid var(--pf-border-light);border-radius:6px;padding:.8rem;font-size:.82rem;color:var(--pf-muted-light);line-height:1.8;white-space:pre-line;font-style:italic;">' + esc(intro + transition + sec.content + closing) + '</div>' +
      '</div>';
    }).join('');

    return '<div class="pf-card accent-gold" style="margin-bottom:.8rem;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<div><div style="font-weight:600;color:var(--pf-text-light);">Audio Script: ' + esc(sop.name) + '</div>' +
        '<div style="font-size:.75rem;color:var(--pf-muted-light);">' + sop.sections.length + ' segments | ~' + totalMin + ' minutes</div></div>' +
        '<button class="pf-btn outline" onclick="toast(\'Script copied to clipboard\')">Copy Script</button>' +
      '</div>' +
    '</div>' + segments;
  }

  /* -- Flashcards -- */
  function renderPFFlashcards(sop) {
    var idx = STATE.studioState.flashcardIndex;
    var card = sop.sections[idx];
    var total = sop.sections.length;
    var flipped = STATE.studioState.flashcardFlipped;

    var prevBtn = idx > 0 ? '<button class="pf-btn outline" onclick="pfFlashcard(-1)">Previous</button>' : '<div></div>';
    var nextBtn = idx < total - 1 ? '<button class="pf-btn primary" onclick="pfFlashcard(1)">Next</button>' : '<button class="pf-btn" style="background:var(--pf-green);color:#fff;" onclick="toast(\'Flashcard review complete\')">Done</button>';

    return '<div style="text-align:center;margin-bottom:.6rem;font-size:.75rem;color:var(--pf-muted-light);">Card ' + (idx+1) + ' of ' + total + '</div>' +
      '<div onclick="pfFlip()" style="background:' + (flipped ? 'var(--pf-card-light)' : 'var(--pf-blue)') + ';border:1px solid ' + (flipped ? 'var(--pf-border-light)' : 'var(--pf-blue)') + ';border-radius:10px;padding:2.5rem 1.6rem;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:1rem;">' +
        (flipped ?
          '<div style="font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--pf-muted-light);margin-bottom:.8rem;">ANSWER</div><div style="font-size:.85rem;color:var(--pf-text-light);line-height:1.8;text-align:center;">' + esc(card.content) + '</div>'
          :
          '<div style="font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:.8rem;">QUESTION</div><div style="font-size:1.1rem;font-weight:700;color:#fff;text-align:center;">' + esc('What should you know about: ' + card.title + '?') + '</div><div style="font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.8rem;">Click to reveal</div>'
        ) +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;">' + prevBtn + nextBtn + '</div>';
  }

  function pfFlashcard(dir) {
    var sop = STATE.trainingSops.find(function(s){return s.id===STATE.studioState.selectedSop});
    STATE.studioState.flashcardIndex = Math.max(0, Math.min(sop.sections.length-1, STATE.studioState.flashcardIndex + dir));
    STATE.studioState.flashcardFlipped = false;
    render();
  }

  function pfFlip() {
    STATE.studioState.flashcardFlipped = !STATE.studioState.flashcardFlipped;
    render();
  }

  /* -- Upload handler -- */
  function handlePFUpload(input) {
    var file = input.files[0];
    if (!file) return;
    var statusEl = document.getElementById('pf-upload-status');
    statusEl.textContent = 'Parsing ' + file.name + '...';
    statusEl.style.color = 'var(--pf-blue)';

    var reader = new FileReader();
    reader.onload = function(e) {
      var text = e.target.result;
      var lines = text.split('\n').filter(function(l){return l.trim()});
      var sections = [];
      var currentTitle = null;
      var currentContent = [];

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        var isHeading = (line === line.toUpperCase() && line.length < 100 && line.length > 2) || (line.endsWith(':') && line.length < 80) || (line.match(/^\d+\.\s+[A-Z]/) && line.length < 100);
        if (isHeading) {
          if (currentTitle && currentContent.length > 0) sections.push({title: currentTitle, content: currentContent.join('\n')});
          currentTitle = line.replace(/:$/, '');
          currentContent = [];
        } else {
          currentContent.push(line);
        }
      }
      if (currentTitle && currentContent.length > 0) sections.push({title: currentTitle, content: currentContent.join('\n')});
      if (sections.length === 0 && lines.length > 0) {
        var cs = Math.max(1, Math.floor(lines.length / 6));
        for (var j = 0; j < lines.length; j += cs) {
          sections.push({title: 'Section ' + (sections.length + 1), content: lines.slice(j, j + cs).join('\n')});
        }
      }

      if (sections.length === 0) {
        statusEl.textContent = 'Could not parse sections. Try a .txt file with clear headings.';
        statusEl.style.color = 'var(--pf-red)';
        return;
      }

      var sopId = 'upload-' + Date.now();
      STATE.trainingSops.push({
        id: sopId,
        name: file.name.replace(/\.[^/.]+$/, '').replace(/[_-]/g, ' ').replace(/\b\w/g, function(l){return l.toUpperCase()}),
        category: 'Uploaded',
        sections: sections
      });
      statusEl.textContent = sections.length + ' sections parsed from ' + file.name;
      statusEl.style.color = 'var(--pf-green)';
      selectPFSop(sopId);
    };
    reader.readAsText(file);
  }

  /* Init handled at top of script via DOMContentLoaded */
</script>
</body>
</html>
